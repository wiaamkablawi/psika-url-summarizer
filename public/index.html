<!doctype html>
<html lang="he">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>psika-url-summarizer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6fb;
      }

      main {
        width: min(92vw, 700px);
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 12px 28px rgba(26, 39, 90, 0.14);
        padding: 2rem;
        text-align: right;
      }

      h1 {
        margin-top: 0;
        text-align: center;
      }

      p,
      li {
        color: #334155;
        line-height: 1.55;
      }

      .actions {
        display: flex;
        justify-content: center;
        margin: 1rem 0 1.5rem;
      }

      button {
        border: 0;
        border-radius: 10px;
        background: #1d4ed8;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        padding: 0.85rem 1.25rem;
        cursor: pointer;
      }

      button:hover {
        background: #1e40af;
      }

      .note {
        margin: 0.75rem 0 0;
        font-size: 0.95rem;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1e3a8a;
        border-radius: 10px;
        padding: 0.75rem;
      }

      section {
        margin-top: 1rem;
        border-top: 1px solid #e2e8f0;
        padding-top: 1rem;
      }

      h2 {
        margin: 0 0 0.75rem;
        color: #0f172a;
        font-size: 1.2rem;
      }

      ol {
        margin: 0;
        padding-inline-start: 1.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>סוכן חיפוש פשוט</h1>
      <p>
        לוחצים על הכפתור, והסוכן פותח עמוד חדש, ממלא את השדות ולוחץ חיפוש אוטומטית.
      </p>

      <div class="actions">
        <button id="open-search">הפעל את הסוכן</button>
      </div>

      <section aria-label="סטטוס אוטומציה">
        <h2>מה המערכת מבצעת אוטומטית</h2>
        <ol>
          <li>פותח את מסך החיפוש של בית המשפט העליון.</li>
          <li>מגדיר תאריך משבוע אחרון ועד היום.</li>
          <li>מסמן: <strong>מהותיות בלבד</strong>.</li>
          <li>מגדיר מינימום <strong>2</strong> עמודים.</li>
          <li>בוחר מדור <strong>פלילי</strong> ולוחץ חיפוש.</li>
        </ol>
      </section>
    </main>

    <script>
      const AUTOMATED_SEARCH_PATH = "/autoSupremeSearchAgent";
      const openSearchButton = document.getElementById("open-search");

      openSearchButton.addEventListener("click", () => {
        window.open(AUTOMATED_SEARCH_PATH, "_blank", "noopener,noreferrer");
      });
    </script>
  </body>
</html>
